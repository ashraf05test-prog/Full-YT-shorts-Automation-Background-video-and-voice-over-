name: YouTube Auto Upload

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y ffmpeg
      - run: pip install requests
      - name: Run
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DRIVE_CLIENT_ID: ${{ secrets.DRIVE_CLIENT_ID }}
          DRIVE_CLIENT_SECRET: ${{ secrets.DRIVE_CLIENT_SECRET }}
          DRIVE_REFRESH_TOKEN: ${{ secrets.DRIVE_REFRESH_TOKEN }}
          VIDEO_FOLDER_ID: ${{ secrets.VIDEO_FOLDER_ID }}
          AUDIO_FOLDER_ID: ${{ secrets.AUDIO_FOLDER_ID }}
          YT_PRIVACY: ${{ secrets.YT_PRIVACY }}
        run: python3 auto_upload.py
